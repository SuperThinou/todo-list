<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>
    <header>
        <h1>my Todo List</h1>
    </header>
    <div class="content-container">
        <div class="sidebar">
            <h2>Tasks</h2>
            <div class="nav-el" id="allTasksBtn">
                <h3>All tasks</h3>
            </div>
            <div class="nav-el" id="todayBtn">
                <h3>Today</h3>
            </div>

            <div class="nav-el" id="thisWeekBtn">
                <h3>This Week</h3>
            </div>
            <h2>Projects</h2>
        </div>
        <main>
            <h2 id="mainTitle">All tasks</h2>
            <div id="newTaskBtn">
                <h4>New task</h4>
            </div>
            <div class="overlay hidden" id="newTaskPopup">
                <form id="addTaskForm" action="">
                    <h2 id="addNewTaskTitle">Add new task</h2>

                    <input id="title" name="title" type="text" placeholder="Title" aria-label="task title" required
                        maxlength="100" />

                    <textarea id="description" name="description" placeholder="Description (optional)"
                        aria-label="task description" maxlength="400" /></textarea>

                    <fieldset>
                        <legend>Priority</legend>
                        <input type="radio" id="low" value="low" name="priority">
                        <label for="low">Low</label>

                        <input type="radio" id="medium" value="medium" name="priority">
                        <label for=" medium">Medium</label>

                        <input type="radio" id="high" value="high" name="priority">
                        <label for=" high">High</label>
                    </fieldset>

                    <button id="addBtn" type="button">Add</button>
                </form>
            </div>
        </main>
    </div>

    <footer>
        <p>NBX 2025 ©</p>
        <a href="https://github.com/SuperThinou" target="_blank"><img src="./icons/github-mark-grey.svg"
                alt="Github logo" class="github-logo" /></a>
    </footer>
</body>

</html>
